<!doctype html>
<html>
<head>
  <meta charset="UTF-8" />
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      position: relative;
      width: calc(100% - 16px);
      max-width: 460px;

      display: flex;
      gap: 10px;
      padding: 10px 36px 10px 10px;
      box-sizing: border-box;
      align-items: center;
      justify-content: center;

      -webkit-app-region: drag;
      user-select: none;
      cursor: move;
    }

    .close-btn {
      position: absolute;
      top: 6px;
      right: 6px;
      width: 22px;
      height: 22px;
      border: 0;
      border-radius: 6px;
      background: rgba(255,255,255,0.12);
      color: #fff;
      font-size: 14px;
      line-height: 22px;
      text-align: center;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .close-btn:hover { background: rgba(255,255,255,0.22); }

    .cover {
      width: 96px;
      height: 96px;
      border-radius: 8px;
      object-fit: cover;
      background: #222;
      flex: 0 0 96px;
      -webkit-app-region: no-drag;
    }

    .meta {
      min-width: 0;
      flex: 1;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .title, .artist, .time {
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .title { font-weight: 700; }
    .artist { opacity: .85; margin-top: 2px; }
    .time { opacity: .9; margin-top: 6px; font-family: ui-monospace, monospace; }

    .controls {
      margin-top: 8px;
      display: flex;
      gap: 8px;
      justify-content: center;
      -webkit-app-region: no-drag;
    }

    .ctrl-btn {
      border: 0;
      border-radius: 8px;
      background: rgba(255,255,255,0.14);
      color: #fff;
      width: 30px;
      height: 30px;
      font-size: 14px;
      cursor: pointer;
      line-height: 30px;
      text-align: center;
      padding: 0;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.24); }
  </style>
</head>
<body>
  <div class="wrap">
    <button id="closeBtn" class="close-btn" title="Close mini player">×</button>

    <img id="cover" class="cover" />
    <div class="meta">
      <div id="title" class="title">Nothing playing</div>
      <div id="artist" class="artist">-</div>
      <div id="time" class="time">0:00 / --:--</div>

      <div class="controls">
        <button id="prevBtn" class="ctrl-btn" title="Previous">⏮</button>
        <button id="playPauseBtn" class="ctrl-btn" title="Play/Pause">⏯</button>
        <button id="nextBtn" class="ctrl-btn" title="Next">⏭</button>
      </div>
    </div>
  </div>

  <script>
    const $cover = document.getElementById('cover');
    const $title = document.getElementById('title');
    const $artist = document.getElementById('artist');
    const $time = document.getElementById('time');
    const $close = document.getElementById('closeBtn');

    const $prev = document.getElementById('prevBtn');
    const $pp = document.getElementById('playPauseBtn');
    const $next = document.getElementById('nextBtn');

    const fmt = (sec = 0) => {
      sec = Math.max(0, Math.floor(sec || 0));
      const m = Math.floor(sec / 60), s = sec % 60;
      return `${m}:${String(s).padStart(2, '0')}`;
    };

    const render = (t = {}) => {
      $title.textContent = t.title || 'Nothing playing';
      $artist.textContent = t.artist || '-';
      const cur = fmt(t.currentTimeSec || 0);
      const dur = (t.durationSec || 0) > 0 ? fmt(t.durationSec) : '--:--';
      $time.textContent = `${cur} / ${dur}${t.paused ? '  ⏸' : ''}`;

      if (t.albumArt) {
        $cover.src = t.albumArt;
        $cover.style.visibility = 'visible';
      } else {
        $cover.removeAttribute('src');
        $cover.style.visibility = 'hidden';
      }
    };

    $close.addEventListener('click', async () => {
      await window.miniAPI.toggle();
    });

    $prev.addEventListener('click', async () => { await window.miniAPI.command('previous'); });
    $pp.addEventListener('click', async () => { await window.miniAPI.command('playPause'); });
    $next.addEventListener('click', async () => { await window.miniAPI.command('next'); });

    window.miniAPI.getNowPlaying().then(render);
    window.miniAPI.onNowPlaying(render);
  </script>
</body>
</html>
